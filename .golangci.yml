version: "2"

linters:
  default: standard
  enable:
    - copyloopvar
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    misspell:
      # Deutsche Kommentare/Ausgaben: kein Tippfehler von "configuration"
      ignore-rules:
        - konfiguration
        - periodisch
        - verifikation
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      # gosec ist auf Testcode Rauschen: Fixtures (Fake-IdP, bewusste Redirects,
      # feste Hostnamen) tun absichtlich „unsichere" Dinge und werden nie
      # ausgeliefert. Deckt u. a. die G710-Open-Redirect-Meldungen der Fake-IdPs ab.
      - path: _test\.go
        linters:
          - gosec
      # internal/version ist idiomatisch; Kollision mit stdlib go/version ist hier irrelevant.
      - path: internal/version/
        text: "avoid package names that conflict with Go standard library"
        linters:
          - revive
      # internal/metrics ist idiomatisch; Kollision mit stdlib runtime/metrics ist hier irrelevant.
      - path: internal/metrics/
        text: "avoid package names that conflict with Go standard library"
        linters:
          - revive
      # internal/api ist im Projektlayout (ADR-001) als HTTP-API-Paket gesetzt.
      - path: internal/api/
        text: "avoid meaningless package names"
        linters:
          - revive

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/guided-traffic/guided-ssh
