# Konfiguration für chart-testing (ct) — Helm-Chart-Lint in der CI.
chart-dirs:
  - deploy/helm
target-branch: main
# Maintainer sind eine Org, keine GitHub-User — Validierung würde fehlschlagen.
validate-maintainers: false
# Release erfolgt über git-Tag, nicht über Chart-Versions-Bump.
check-version-increment: false
