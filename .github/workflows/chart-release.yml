name: Release Helm Chart

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Chart Release (gh-pages)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # chart-releaser braucht die Tag-Historie

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5

      # Chart-Version = App-Version aus dem git-Tag (vX.Y.Z ⇒ X.Y.Z). version
      # steuert die gh-pages-Release-Version, appVersion den Default-Image-Tag
      # (_helpers.tpl: default .Chart.AppVersion .Values.image.tag) — so zeigt
      # das released Chart immer auf das gleichnamige Image dieses Releases.
      # Die Werte in Chart.yaml sind nur Lint-Baseline (ct check-version-increment)
      # und werden hier zur Release-Zeit überschrieben.
      - name: Chart-Version + appVersion aus git-Tag setzen
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Release-Chart-Version: ${VERSION}"
          sed -i -E "s/^version:.*/version: ${VERSION}/" deploy/helm/guided-ssh/Chart.yaml
          sed -i -E "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/guided-ssh/Chart.yaml

      - name: Subchart-Dependencies auflösen
        run: helm dependency build deploy/helm/guided-ssh

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: deploy/helm
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
