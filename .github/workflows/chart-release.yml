name: Release Helm Chart

# Veröffentlicht das Chart als Helm-Repository über GitHub Pages
# (gh-pages-Branch mit index.yaml). chart-releaser erzeugt nur dann ein
# Release, wenn die Chart-Version in Chart.yaml noch nicht veröffentlicht ist
# (Version-Bump ⇒ Release; sonst No-op).
#
# Einmalige Voraussetzung: leerer gh-pages-Branch + GitHub Pages auf diesen
# Branch zeigen lassen — siehe deploy/helm/guided-ssh/README.md.

on:
  push:
    branches:
      - main
    paths:
      - "deploy/helm/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Chart Release (gh-pages)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # chart-releaser braucht die Tag-Historie

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Subchart-Dependencies auflösen
        run: helm dependency build deploy/helm/guided-ssh

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: deploy/helm
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
