name: Test and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          version: v2.9.0

  test:
    name: Test + Coverage-Gate
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Unit- + Integrationstests (Testcontainer) mit Coverage-Gate (>= 80 %)
        run: make cover
      - name: Coverage-Profil als Artefakt
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7
      # Badge wird nicht hier committet, sondern als Artefakt an den
      # semantic-release-Job gereicht, der es via @semantic-release/git
      # zusammen mit dem Release-Commit eincheckt.
      - name: Coverage-Badge erzeugen
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')
          COLOR=$(awk -v c="$COVERAGE" 'BEGIN { print (c >= 90 ? "brightgreen" : c >= 80 ? "green" : c >= 70 ? "yellow" : c >= 60 ? "orange" : "red") }')
          mkdir -p .github/badges
          cat > .github/badges/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${COVERAGE}%",
            "color": "${COLOR}"
          }
          EOF
          echo "Coverage-Badge: ${COVERAGE}% (${COLOR})"
      - name: Coverage-Badge als Artefakt
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-badge
          path: .github/badges/coverage.json

  build:
    name: Build
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git describe braucht Tags für die Versionsinfo
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Binaries bauen
        run: make build

  semantic-release:
    name: Semantic Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, build]
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}
      - name: Coverage-Badge herunterladen
        uses: actions/download-artifact@v8
        with:
          name: coverage-badge
          path: .github/badges/
        continue-on-error: true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm install
      # BOT_PAT statt GITHUB_TOKEN: nur so triggert das erzeugte
      # GitHub-Release den Build-Workflow (build.yml).
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
        run: npx semantic-release
