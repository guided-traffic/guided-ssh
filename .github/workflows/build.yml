name: Release Docker Image

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Versionierte Binaries + deb/rpm-Pakete als Release-Assets (Phase 13);
  # die Version kommt über git describe aus dem Release-Tag (Makefile).
  binaries:
    name: Release-Binaries anhängen
    runs-on: self-hosted
    permissions:
      contents: write # Assets an das GitHub-Release hängen
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git describe braucht Tags für die Versionsinfo

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Cross-Platform-Binaries bauen (Version aus git-Tag)
        run: make cross

      - name: nfpm installieren und Pakete bauen (deb/rpm)
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          make packages

      - name: Checksummen erzeugen
        run: |
          cd bin && sha256sum gssh-* > ../dist/SHA256SUMS
          cd ../dist && sha256sum *.deb *.rpm >> SHA256SUMS

      - name: Assets an das Release hängen
        uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/gssh-*
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS

  build:
    name: Build & Push Docker Image
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: guidedtraffic
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: guidedtraffic/guided-ssh
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          labels: |
            org.opencontainers.image.title=guided-ssh
            org.opencontainers.image.description=SSH certificate authority with IdP-backed access control
            org.opencontainers.image.vendor=Guided Traffic
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/guided-traffic/guided-ssh

      - name: Build-Datum ermitteln
        id: buildinfo
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.buildinfo.outputs.date }}
          provenance: true
          sbom: true

  # Helm-Chart als gh-pages-Helm-Repo veröffentlichen, im selben Release-Lauf wie
  # Binaries und Image. Statt chart-releaser (das eigene guided-ssh-*-Releases
  # anlegt und die .tgz nur als Release-Assets ablegt) wird das Paket direkt auf
  # den gh-pages-Branch committet und die index.yaml auf die GitHub-Pages-URLs
  # gezeigt — Vorbild: valkey-operator/.github/workflows/build.yml (release-helm-gh).
  #
  # version + appVersion kommen aus dem Release-Tag; appVersion ist der Default-
  # Image-Tag (_helpers.tpl: default .Chart.AppVersion .Values.image.tag) — das
  # Chart zeigt so auf das gleichnamige Image dieses Releases. Das Paket wird
  # zusätzlich an das auslösende vX.Y.Z-Release gehängt.
  helm-chart:
    name: Release Helm Chart (gh-pages)
    needs: build
    runs-on: self-hosted
    permissions:
      contents: write # gh-pages-Branch schreiben + Chart ans Release hängen
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      # Chart-Version = App-Version aus dem Release-Tag (vX.Y.Z ⇒ X.Y.Z). version
      # steuert die Repo-Chart-Version, appVersion den Default-Image-Tag. Die Werte
      # in Chart.yaml sind nur Lint-Baseline (ct check-version-increment) und werden
      # hier zur Release-Zeit überschrieben.
      - name: Chart-Version + appVersion aus Release-Tag setzen
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Release-Chart-Version: ${VERSION}"
          sed -i -E "s/^version:.*/version: ${VERSION}/" deploy/helm/guided-ssh/Chart.yaml
          sed -i -E "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/guided-ssh/Chart.yaml

      - name: Subchart-Dependencies auflösen
        run: helm dependency build deploy/helm/guided-ssh

      - name: Helm-Paket erstellen
        run: |
          cd deploy/helm
          helm package guided-ssh/
          mkdir -p repo
          mv *.tgz repo/
          helm repo index repo/ --url https://guided-traffic.github.io/guided-ssh/

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Chart-Paket zwischenspeichern
        run: |
          mkdir -p /tmp/helm-charts
          cp -r deploy/helm/repo/* /tmp/helm-charts/

      - name: gh-pages-Branch auschecken
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auf GitHub Pages veröffentlichen
        run: |
          # Neue Charts ins Root-Verzeichnis kopieren
          cp /tmp/helm-charts/*.tgz .

          # index.yaml mit existierendem Index mergen, falls vorhanden
          if [ -f index.yaml ]; then
            mkdir -p temp-repo
            cp *.tgz temp-repo/
            helm repo index temp-repo/ --url https://guided-traffic.github.io/guided-ssh/ --merge index.yaml
            cp temp-repo/index.yaml .
            rm -rf temp-repo
          else
            helm repo index . --url https://guided-traffic.github.io/guided-ssh/
          fi

          git add --force *.tgz index.yaml
          git commit -m "Release Helm chart for $GITHUB_REF_NAME"
          git push --force origin gh-pages

      - name: Chart ans Release hängen
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.tgz
            index.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
