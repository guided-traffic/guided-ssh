# nfpm-Konfiguration für gssh-agentd (deb + rpm).
# Build: make packages  (erwartet nfpm im PATH und bin/gssh-agentd-linux-<arch>)
# Umgebungsvariablen: VERSION (SemVer ohne v-Präfix), ARCH (amd64|arm64)
name: gssh-agentd
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: admin
maintainer: Guided Traffic <mail@hans-fischer.com>
description: |
  guided-ssh Host-Agent: Host-Enrollment, automatische Erneuerung des
  SSH-Host-Zertifikats, TrustedUserCAKeys-Pflege und
  AuthorizedPrincipalsCommand-Helper mit Fail-closed-Cache.
homepage: https://github.com/guided-traffic/guided-ssh
license: Apache-2.0
contents:
  # nfpm expandiert Env-Vars in Metadaten (name/arch/version), aber NICHT in
  # contents[].src-Globs. Darum stellt `make packages` je Arch das passende
  # Binary unter diesem stabilen Pfad bereit (siehe Makefile-Target packages).
  - src: bin/pkg/gssh-agentd
    dst: /usr/bin/gssh-agentd
    file_info:
      mode: 0755
  - src: deploy/packaging/gssh-agentd.service
    dst: /lib/systemd/system/gssh-agentd.service
    file_info:
      mode: 0644
scripts:
  postinstall: deploy/packaging/postinstall.sh
