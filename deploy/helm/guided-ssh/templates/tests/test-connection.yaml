apiVersion: v1
kind: Pod
metadata:
  name: {{ include "guided-ssh.fullname" . }}-test-connection
  labels:
    {{- include "guided-ssh.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: busybox:1.37
      command: ["wget"]
      args:
        - -q
        - -O-
        - http://{{ include "guided-ssh.fullname" . }}:{{ .Values.service.port }}/healthz
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
