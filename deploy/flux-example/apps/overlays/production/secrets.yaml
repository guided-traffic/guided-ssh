# ACHTUNG: Beispieldatei mit Platzhaltern. Im echten GitOps-Repo MUSS diese
# Datei SOPS-verschlüsselt sein (sops --encrypt --in-place secrets.yaml,
# Regel in .sops.yaml) — niemals Klartext-Secrets committen.
apiVersion: v1
kind: Secret
metadata:
  name: guided-ssh-db
  namespace: guided-ssh
type: Opaque
stringData:
  # Postgres-Verbindungsdaten als einzelne Keys (extern oder CloudNativePG,
  # siehe Chart-README; Key-Namen anpassbar via secrets.db.keys).
  host: postgres.example.com
  port: "5432"
  username: gssh
  password: REPLACE_ME
  database: gssh
  sslmode: require
---
apiVersion: v1
kind: Secret
metadata:
  name: guided-ssh-ca
  namespace: guided-ssh
type: Opaque
stringData:
  # 32 Bytes Base64 (AES-256): openssl rand -base64 32
  ca-master-key: REPLACE_ME_BASE64_32_BYTES
---
apiVersion: v1
kind: Secret
metadata:
  name: guided-ssh-sync-oidc
  namespace: guided-ssh
type: Opaque
stringData:
  # Client-Secret des IdP-Service-Accounts gssh-grants-sync (siehe README)
  client-secret: REPLACE_ME
