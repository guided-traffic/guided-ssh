# Flux-Kustomization des Clusters staging: synct das staging-Overlay aus dem
# GitOps-Repo (GitRepository flux-system legt `flux bootstrap` an) und
# entschlüsselt SOPS-Secrets mit dem age-Key im Secret sops-age.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guided-ssh
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/overlays/staging
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
