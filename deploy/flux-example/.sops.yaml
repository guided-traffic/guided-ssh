# SOPS-Konfiguration des GitOps-Repos: jede secrets.yaml wird mit age
# verschlüsselt; encrypted_regex lässt Metadaten im Klartext, damit Diffs
# reviewbar bleiben. Public-Key durch den eigenen ersetzen (age-keygen,
# siehe README Abschnitt "Secrets mit SOPS").
creation_rules:
  - path_regex: .*secrets\.yaml$
    encrypted_regex: ^(data|stringData)$
    age: age1hl09mf56vc9dupa9nk8gt0zcjj4sea59r9c5wkq9p5a8j5685pkqcny5rh
